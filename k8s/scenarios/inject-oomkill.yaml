# Demo Scenario 1: OOMKill injection
# Apply this to simulate an OOMKill incident for the demo
# Usage: kubectl apply -f inject-oomkill.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog-demo
  namespace: default
  labels:
    app: memory-hog-demo
    scenario: oomkill-demo
    managed-by: neuroscale-autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog-demo
  template:
    metadata:
      labels:
        app: memory-hog-demo
    spec:
      containers:
      - name: memory-hog
        image: polinux/stress
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "600M", "--vm-hang", "1"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"   # Intentionally too low → OOMKill
            cpu: "200m"

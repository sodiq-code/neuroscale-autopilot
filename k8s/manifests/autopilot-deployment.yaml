# NeuroScale Autopilot — Kubernetes Deployment Manifest
# Deploy the autopilot backend into a K8s cluster
apiVersion: v1
kind: Namespace
metadata:
  name: neuroscale-autopilot
  labels:
    managed-by: neuroscale-autopilot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autopilot-config
  namespace: neuroscale-autopilot
data:
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  QWEN_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  QWEN_MODEL_MAX: "qwen-max"
  QWEN_MODEL_TURBO: "qwen-turbo"
  QWEN_EMBEDDING_MODEL: "text-embedding-v3"
---
apiVersion: v1
kind: Secret
metadata:
  name: autopilot-secrets
  namespace: neuroscale-autopilot
type: Opaque
stringData:
  QWEN_API_KEY: "your-qwen-api-key"
  SLACK_WEBHOOK_URL: "your-slack-webhook"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroscale-autopilot
  namespace: neuroscale-autopilot
  labels:
    app: neuroscale-autopilot
    version: "1.0.0"
    hackathon: qwen-global-ai-2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuroscale-autopilot
  template:
    metadata:
      labels:
        app: neuroscale-autopilot
        version: "1.0.0"
    spec:
      serviceAccountName: autopilot-sa
      containers:
      - name: autopilot
        image: ghcr.io/sodiq-code/neuroscale-autopilot:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: autopilot-config
        - secretRef:
            name: autopilot-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: neuroscale-autopilot
  namespace: neuroscale-autopilot
spec:
  selector:
    app: neuroscale-autopilot
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autopilot-sa
  namespace: neuroscale-autopilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autopilot-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["patch", "update"]
- apiGroups: ["kyverno.io"]
  resources: ["clusterpolicies", "policies", "policyexceptions"]
  verbs: ["get", "list", "watch", "create", "patch"]
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autopilot-cluster-role-binding
subjects:
- kind: ServiceAccount
  name: autopilot-sa
  namespace: neuroscale-autopilot
roleRef:
  kind: ClusterRole
  name: autopilot-cluster-role
  apiGroup: rbac.authorization.k8s.io

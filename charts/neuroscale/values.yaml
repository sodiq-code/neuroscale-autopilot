replicaCount: 1

image:
  repository: ghcr.io/sodiq-code/neuroscale-autopilot
  tag: v2.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

dashboard:
  enabled: true
  port: 3000
  ingress:
    enabled: false
    className: nginx
    host: neuroscale.local

qwen:
  baseUrl: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  apiKeySecretName: neuroscale-qwen
  apiKeySecretKey: api-key
  modelMax: qwen3-max
  modelPlus: qwen-plus
  modelTurbo: qwen-turbo
  embeddingModel: text-embedding-v3

trust:
  executeThreshold: 90
  dryrunThreshold: 70

chaos:
  enabled: true
  namespace: neuroscale-chaos

safety:
  dryRun: true
  humanApprovalTimeoutSeconds: 300

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

rbac:
  create: true
  serviceAccountName: neuroscale

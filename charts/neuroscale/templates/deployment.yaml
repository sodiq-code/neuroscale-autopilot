apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroscale
  labels:
    app.kubernetes.io/name: neuroscale
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: neuroscale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neuroscale
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      containers:
        - name: neuroscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: QWEN_BASE_URL
              value: {{ .Values.qwen.baseUrl | quote }}
            - name: QWEN_MODEL_MAX
              value: {{ .Values.qwen.modelMax | quote }}
            - name: QWEN_MODEL_PLUS
              value: {{ .Values.qwen.modelPlus | quote }}
            - name: QWEN_MODEL_TURBO
              value: {{ .Values.qwen.modelTurbo | quote }}
            - name: QWEN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qwen.apiKeySecretName }}
                  key: {{ .Values.qwen.apiKeySecretKey }}
            - name: DRY_RUN
              value: {{ .Values.safety.dryRun | quote }}
            - name: TRUST_EXECUTE_THRESHOLD
              value: {{ .Values.trust.executeThreshold | quote }}
            - name: TRUST_DRYRUN_THRESHOLD
              value: {{ .Values.trust.dryrunThreshold | quote }}
            - name: CHAOS_ENABLED
              value: {{ .Values.chaos.enabled | quote }}
          resources:
{{ toYaml .Values.resources | indent 12 }}

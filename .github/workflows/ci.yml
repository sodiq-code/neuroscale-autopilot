name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile main.py
          find agents/ mcp_server/ alibaba_cloud/ -name "*.py" -exec python -m py_compile {} \;

      - name: Run tests
        env:
          QWEN_API_KEY: mock-key-for-ci
          DRY_RUN: "true"
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: neuroscale-autopilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
